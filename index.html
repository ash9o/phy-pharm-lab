<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virtual Pharmaceutics Lab Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- KaTeX for Math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* Advanced Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .scale-in { animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @keyframes dropFall { 
            0% { transform: translateY(0) scale(1); opacity: 1; } 
            70% { transform: translateY(50px) scale(1.1); opacity: 1; } 
            100% { transform: translateY(60px) scale(0.2); opacity: 0; } 
        }
        .anim-drop { animation: dropFall 0.4s infinite linear; }

        @keyframes svgBubbleRise {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-30px) scale(1.2); opacity: 0; }
        }
        .svg-bubble { animation: svgBubbleRise 1.5s infinite ease-in; transform-origin: center; }

        @keyframes svgPrecipitateFall {
            0% { transform: translateY(-40px); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(0px); opacity: 0.9; }
        }
        .svg-precipitate { animation: svgPrecipitateFall 2s forwards ease-out; }

        @keyframes micelleSpin { 100% { transform: rotate(360deg); } }
        .anim-micelle { animation: micelleSpin 10s infinite linear; }
        
        @keyframes stir {
            0% { transform: translateX(-5px) rotate(-10deg); }
            50% { transform: translateX(5px) rotate(10deg); }
            100% { transform: translateX(-5px) rotate(-10deg); }
        }
        .anim-stir { animation: stir 0.5s infinite ease-in-out; }

        /* Smooth Liquid Transitions */
        .liquid-fill { transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .flask-liquid-fill { transition: y 0.6s cubic-bezier(0.4, 0, 0.2, 1), fill 1s ease; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .math-box { font-size: 1.05em; line-height: 1.6; overflow-x: auto; overflow-y: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Interactive Titration Fills */
        .pink-endpoint-fill { fill: rgba(236, 72, 153, 0.6) !important; }
        .brown-iodine-fill { fill: rgba(146, 64, 14, 0.9) !important; }
        .clear-liquid-fill { fill: rgba(255, 255, 255, 0.15) !important; }

        /* Mobile Sidebar Overlay */
        #mobile-overlay { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex overflow-hidden selection:bg-blue-500/30">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" onclick="app.toggleSidebar(false)" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden backdrop-blur-sm opacity-0 pointer-events-none"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="w-80 bg-slate-900 flex flex-col shadow-2xl z-50 shrink-0 border-r border-slate-800 fixed inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-5 md:p-6 bg-slate-950 text-white font-bold text-xl md:text-2xl flex items-center justify-between border-b border-slate-800 tracking-tight shrink-0">
            <div class="flex items-center gap-3 md:gap-4">
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20 shrink-0">
                    <i class="fa-solid fa-microscope text-white text-base md:text-xl"></i>
                </div>
                <span>PharmaLab <span class="text-blue-500 font-light">Pro</span></span>
            </div>
            <button onclick="app.toggleSidebar(false)" class="lg:hidden text-slate-400 hover:text-white p-2 focus:outline-none">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto pb-6">
            <div class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-widest mt-2">Laboratory Modules</div>
            <nav class="px-3 space-y-1">
                <button onclick="app.switchLab('solubility')" id="nav-solubility" class="nav-btn w-full flex flex-col px-4 py-3 rounded-xl hover:bg-slate-800 text-left transition-all bg-slate-800 text-white border border-slate-700 shadow-sm relative overflow-hidden group">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
                    <span class="flex items-center gap-3 font-semibold text-[15px]"><i class="fa-solid fa-droplet w-6 text-blue-400"></i> Lab 1: Solubility Methods</span>
                    <span class="text-xs text-slate-400 ml-9 mt-1">Co-Solvency, Salts & Complexation</span>
                </button>
                <button onclick="app.switchLab('aspirin')" id="nav-aspirin" class="nav-btn w-full flex flex-col px-4 py-3 rounded-xl hover:bg-slate-800 text-left transition-all text-slate-400 border border-transparent relative overflow-hidden group">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-transparent group-hover:bg-slate-600 transition-colors"></div>
                    <span class="flex items-center gap-3 font-semibold text-[15px]"><i class="fa-solid fa-capsules w-6 text-purple-400"></i> Lab 2: Aspirin Solubilization</span>
                    <span class="text-xs text-slate-500 ml-9 mt-1">Tri-sodium Citrate Titration</span>
                </button>
                <button onclick="app.switchLab('micellar')" id="nav-micellar" class="nav-btn w-full flex flex-col px-4 py-3 rounded-xl hover:bg-slate-800 text-left transition-all text-slate-400 border border-transparent relative overflow-hidden group">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-transparent group-hover:bg-slate-600 transition-colors"></div>
                    <span class="flex items-center gap-3 font-semibold text-[15px]"><i class="fa-solid fa-soap w-6 text-teal-400"></i> Lab 3: Micellar Solubilization</span>
                    <span class="text-xs text-slate-500 ml-9 mt-1">Surfactants & Phenol Red Titration</span>
                </button>
                <button onclick="app.switchLab('surface')" id="nav-surface" class="nav-btn w-full flex flex-col px-4 py-3 rounded-xl hover:bg-slate-800 text-left transition-all text-slate-400 border border-transparent relative overflow-hidden group">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-transparent group-hover:bg-slate-600 transition-colors"></div>
                    <span class="flex items-center gap-3 font-semibold text-[15px]"><i class="fa-solid fa-water w-6 text-cyan-400"></i> Lab 4: Surface Tension</span>
                    <span class="text-xs text-slate-500 ml-9 mt-1">Stalagmometer & Micelle Formation</span>
                </button>
                <button onclick="app.switchLab('kinetics')" id="nav-kinetics" class="nav-btn w-full flex flex-col px-4 py-3 rounded-xl hover:bg-slate-800 text-left transition-all text-slate-400 border border-transparent relative overflow-hidden group">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-transparent group-hover:bg-slate-600 transition-colors"></div>
                    <span class="flex items-center gap-3 font-semibold text-[15px]"><i class="fa-solid fa-stopwatch w-6 text-orange-400"></i> Lab 5: Reaction Kinetics</span>
                    <span class="text-xs text-slate-500 ml-9 mt-1">Aspirin Hydrolysis Tracking</span>
                </button>
                <button onclick="app.switchLab('viscosity')" id="nav-viscosity" class="nav-btn w-full flex flex-col px-4 py-3 rounded-xl hover:bg-slate-800 text-left transition-all text-slate-400 border border-transparent relative overflow-hidden group">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-transparent group-hover:bg-slate-600 transition-colors"></div>
                    <span class="flex items-center gap-3 font-semibold text-[15px]"><i class="fa-solid fa-hourglass-half w-6 text-amber-400"></i> Lab 6: Polymer Viscosity</span>
                    <span class="text-xs text-slate-500 ml-9 mt-1">Capillary Flow & Molecular Weight</span>
                </button>
            </nav>

            <div class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-widest mt-4 border-t border-slate-800/50 pt-4">Study Materials</div>
            <nav class="px-3 space-y-1">
                <button onclick="app.switchLab('studyGuide')" id="nav-studyGuide" class="nav-btn w-full flex flex-col px-4 py-3 rounded-xl hover:bg-slate-800 text-left transition-all text-slate-400 border border-transparent relative overflow-hidden group">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-transparent group-hover:bg-slate-600 transition-colors"></div>
                    <span class="flex items-center gap-3 font-semibold text-[15px]"><i class="fa-solid fa-book-open w-6 text-indigo-400"></i> Answer Keys</span>
                    <span class="text-xs text-slate-500 ml-9 mt-1">Solubility & Solubilization Quizzes</span>
                </button>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-800 bg-slate-900/50 shrink-0">
            <button onclick="app.openQuiz()" class="w-full py-3 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold rounded-lg shadow-lg shadow-emerald-500/20 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-graduation-cap"></i> Final Lab Assessment
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full relative bg-[#0B1121] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#0B1121] to-black w-full overflow-hidden">
        <header class="glass-panel p-4 md:p-6 z-10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b-0 border-slate-800 shadow-xl w-full shrink-0">
            <div class="flex items-start gap-3 w-full sm:w-auto">
                <button onclick="app.toggleSidebar(true)" class="lg:hidden text-slate-300 hover:text-white mt-1.5 focus:outline-none shrink-0">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
                <div class="min-w-0 flex-1">
                    <div class="flex items-center gap-2 md:gap-3 mb-1 flex-wrap">
                        <span id="header-badge" class="px-2 md:px-2.5 py-0.5 rounded text-[10px] md:text-xs font-bold bg-blue-500/20 text-blue-400 border border-blue-500/30 whitespace-nowrap">Lab 1</span>
                        <h1 id="header-title" class="text-xl md:text-3xl font-bold text-white tracking-tight truncate">Solubility Enhancements</h1>
                    </div>
                    <p id="header-subtitle" class="text-slate-400 text-xs md:text-sm max-w-2xl truncate sm:whitespace-normal line-clamp-1 sm:line-clamp-none">Explore three methods to increase solubility: Co-solvency, Salt Formation, and Complexation.</p>
                </div>
            </div>
            <button onclick="app.resetCurrentLab()" class="px-3 md:px-4 py-2 bg-slate-800 hover:bg-rose-500/20 hover:text-rose-400 hover:border-rose-500/50 text-slate-300 rounded-lg text-xs md:text-sm font-semibold transition-all border border-slate-700 flex items-center gap-2 group shrink-0 w-full sm:w-auto justify-center">
                <i class="fa-solid fa-rotate-right group-hover:animate-spin"></i><span>Reset Activity</span>
            </button>
        </header>

        <div id="lab-container" class="flex-1 overflow-y-auto p-4 md:p-6 scroll-smooth z-0 w-full">
            <!-- Dynamic Content -->
        </div>
    </main>

    <!-- Quiz Modal -->
    <div id="quiz-modal" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden flex-col items-center justify-center p-3 md:p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-3xl shadow-2xl flex flex-col max-h-[95vh] md:max-h-[90vh] scale-in">
            <div class="p-4 md:p-6 border-b border-slate-800 flex justify-between items-center bg-slate-800/50 rounded-t-2xl shrink-0">
                <h2 class="text-xl md:text-2xl font-bold text-white flex items-center gap-3"><i class="fa-solid fa-clipboard-question text-emerald-400"></i> <span class="truncate">Lab Assessment Notebook</span></h2>
                <button onclick="document.getElementById('quiz-modal').classList.add('hidden')" class="text-slate-400 hover:text-white transition-colors p-2"><i class="fa-solid fa-xmark text-xl md:text-2xl"></i></button>
            </div>
            <div id="quiz-content" class="p-4 md:p-8 overflow-y-auto flex-1 space-y-6 md:space-y-8">
                <!-- Quiz Injected Here -->
            </div>
        </div>
    </div>

    <!-- Central SVG Resource Defs -->
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
        <defs>
            <clipPath id="universal-flask-clip">
                <path d="M 40 5 L 60 5 L 60 45 L 90 105 C 95 115 85 120 80 120 L 20 120 C 15 120 5 115 10 105 L 40 45 Z" />
            </clipPath>
        </defs>
    </svg>

    <script>
        const app = {
            currentLab: 'solubility',
            chartInstance: null,
            sidebarOpen: false,
            
            state: {
                solubility: { part: 1, step: 0, water: 10, alcohol: 0, maxAlcohol: 4, dissolved: false, saltStep: 0, complexStep: 0 },
                aspirin: { step: 0, activeFlask: null, titrating: false, naohAdded: 0, endpoint: 0, data: [] },
                micellar: { activeFlask: null, titrating: false, naohAdded: 0, endpoint: 0, data: [] },
                surface: { step: 0, selectedConc: null, drops: 0, measuring: false, data: [] },
                kinetics: { temp: 45, time: 0, sampling: false, data: {45:[], 55:[], 70:[]} },
                viscosity: { conc: 0, measuring: false, flowTimer: 0, data: [] }
            },

            constants: {
                surfaceData: { 'Water': { drops: 30, st: 72.8, density: 1.0 }, '0.01%': { drops: 35, density: 1.01 }, '0.03%': { drops: 42, density: 1.02 }, '0.05%': { drops: 48, density: 1.04 }, '0.075%': { drops: 54, density: 1.05 }, '0.1%': { drops: 60, density: 1.1 }, '0.2%': { drops: 61, density: 1.2 } },
                viscosityData: { '0': { time: 10 }, '0.2': { time: 11.2 }, '0.4': { time: 12.5 }, '0.6': { time: 13.9 }, '0.8': { time: 15.4 } },
                kineticsData: { 45: { k: 0.0105 }, 55: { k: 0.0223 }, 70: { k: 0.0510 } },
                aspirinTitration: { 0: { expectedNaoh: 2.5, dissolved: 25 }, 1: { expectedNaoh: 5.0, dissolved: 50 }, 2: { expectedNaoh: 8.5, dissolved: 85 }, 3: { expectedNaoh: 8.0, dissolved: 80 } },
                micellarTitration: { 0: { expectedNaoh: 2.9 }, 0.05: { expectedNaoh: 3.5 }, 0.5: { expectedNaoh: 5.8 }, 1: { expectedNaoh: 8.4 }, 5: { expectedNaoh: 18.5 } }
            },

            init() { setTimeout(() => this.renderLab(), 500); },

            toggleSidebar(forceState) {
                this.sidebarOpen = forceState !== undefined ? forceState : !this.sidebarOpen;
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('mobile-overlay');
                
                if (this.sidebarOpen) {
                    sidebar.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden', 'opacity-0', 'pointer-events-none');
                    overlay.classList.add('opacity-100');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.remove('opacity-100');
                    overlay.classList.add('opacity-0', 'pointer-events-none');
                    setTimeout(() => { if(!this.sidebarOpen) overlay.classList.add('hidden'); }, 300);
                }
            },

            renderMath() {
                if (window.renderMathInElement) {
                    renderMathInElement(document.getElementById('lab-container'), {
                        delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}],
                        throwOnError: false
                    });
                }
            },

            switchLab(labId) {
                this.currentLab = labId;
                
                // Close sidebar on mobile after selection
                if (window.innerWidth < 1024) {
                    this.toggleSidebar(false);
                }
                
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('bg-slate-800', 'text-white', 'border-slate-700', 'shadow-sm');
                    btn.classList.add('text-slate-400', 'border-transparent');
                    btn.querySelector('div').classList.replace('bg-blue-500', 'bg-transparent');
                });
                const activeBtn = document.getElementById(`nav-${labId}`);
                activeBtn.classList.remove('text-slate-400', 'border-transparent');
                activeBtn.classList.add('bg-slate-800', 'text-white', 'border-slate-700', 'shadow-sm');
                activeBtn.querySelector('div').classList.replace('bg-transparent', 'bg-blue-500');

                const titles = {
                    solubility: { badge: "Lab 1", color: "blue", t: "Solubility Enhancements", s: "Explore Co-solvency, Salt Formation, and Complexation techniques." },
                    aspirin: { badge: "Lab 2", color: "purple", t: "Aspirin Complexation", s: "Perform a full titration to observe the effect of Tri-sodium Citrate." },
                    micellar: { badge: "Lab 3", color: "teal", t: "Micellar Solubilization", s: "Use Tween 60 surfactant to increase the solubility of Salicylic Acid via micelle formation." },
                    surface: { badge: "Lab 4", color: "cyan", t: "Surface Tension & CMC", s: "Analyze surfactant behavior at the microscopic and macroscopic levels." },
                    kinetics: { badge: "Lab 5", color: "orange", t: "Chemical Kinetics", s: "Track the molecular breakdown of Aspirin at different temperatures over time." },
                    viscosity: { badge: "Lab 6", color: "amber", t: "Polymer Viscosity", s: "Determine the intrinsic viscosity and molecular weight of gelatin using capillary flow." },
                    studyGuide: { badge: "Review", color: "indigo", t: "Study Guide & Answer Key", s: "Physical Pharmacy Lab: Solubility & Solubilization Quizzes." }
                };
                
                const meta = titles[labId];
                document.getElementById('header-badge').innerText = meta.badge;
                document.getElementById('header-badge').className = `px-2 md:px-2.5 py-0.5 rounded text-[10px] md:text-xs font-bold bg-${meta.color}-500/20 text-${meta.color}-400 border border-${meta.color}-500/30 whitespace-nowrap`;
                document.getElementById('header-title').innerText = meta.t;
                document.getElementById('header-subtitle').innerText = meta.s;

                if (this.chartInstance) { this.chartInstance.destroy(); this.chartInstance = null; }
                this.renderLab();
            },

            resetCurrentLab() {
                switch(this.currentLab) {
                    case 'solubility': this.state.solubility = { part: 1, step: 0, water: 10, alcohol: 0, maxAlcohol: 4, dissolved: false, saltStep: 0, complexStep: 0 }; break;
                    case 'aspirin': this.state.aspirin = { step: 0, activeFlask: null, titrating: false, naohAdded: 0, endpoint: 0, data: [] }; break;
                    case 'micellar': this.state.micellar = { activeFlask: null, titrating: false, naohAdded: 0, endpoint: 0, data: [] }; break;
                    case 'surface': this.state.surface = { step: 0, selectedConc: null, drops: 0, measuring: false, data: [] }; break;
                    case 'kinetics': this.state.kinetics = { temp: 45, time: 0, sampling: false, data: {45:[], 55:[], 70:[]} }; break;
                    case 'viscosity': this.state.viscosity = { conc: 0, measuring: false, flowTimer: 0, data: [] }; break;
                    case 'studyGuide': break;
                }
                if (this.chartInstance) { this.chartInstance.destroy(); this.chartInstance = null; }
                this.renderLab();
            },

            renderLab() {
                const container = document.getElementById('lab-container');
                let content = '';
                switch(this.currentLab) {
                    case 'solubility': content = this.views.solubility(); break;
                    case 'aspirin': content = this.views.aspirin(); break;
                    case 'micellar': content = this.views.micellar(); break;
                    case 'surface': content = this.views.surface(); break;
                    case 'kinetics': content = this.views.kinetics(); break;
                    case 'viscosity': content = this.views.viscosity(); break;
                    case 'studyGuide': content = this.views.studyGuide(); break;
                }
                container.innerHTML = `<div class="fade-in max-w-7xl mx-auto">${content}</div>`;
                this.renderMath();

                setTimeout(() => {
                    if(this.currentLab === 'aspirin') this.logic.aspirin.drawChart();
                    if(this.currentLab === 'micellar') this.logic.micellar.drawChart();
                    if(this.currentLab === 'surface') this.logic.surface.drawChart();
                    if(this.currentLab === 'kinetics') this.logic.kinetics.drawChart();
                    if(this.currentLab === 'viscosity') this.logic.viscosity.drawChart();
                }, 100);
            },

            getFlaskSVG(fillColor, yFill, extras = '') {
                const clipId = 'flask-clip-' + Math.random().toString(36).substr(2, 9);
                return `
                <svg viewBox="0 0 100 120" class="absolute inset-0 w-full h-full z-0 drop-shadow-xl max-w-full">
                    <defs>
                        <clipPath id="${clipId}">
                            <path d="M 40 5 L 60 5 L 60 45 L 90 105 C 95 115 85 120 80 120 L 20 120 C 15 120 5 115 10 105 L 40 45 Z" />
                        </clipPath>
                    </defs>
                    <path d="M 40 5 L 60 5 L 60 45 L 90 105 C 95 115 85 120 80 120 L 20 120 C 15 120 5 115 10 105 L 40 45 Z" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
                    <!-- Fluid layer constrained perfectly within the glass boundaries -->
                    <g clip-path="url(#${clipId})">
                        <rect x="0" y="${yFill}" width="100" height="150" class="flask-liquid-fill" fill="${fillColor}" />
                        ${extras}
                    </g>
                    <rect x="37" y="5" width="26" height="4" rx="2" fill="rgba(255,255,255,0.5)" />
                </svg>`;
            },

            views: {
                studyGuide() {
                    return `
                    <div class="space-y-6 md:space-y-8 fade-in pb-10">
                        
                        <!-- Group 1 -->
                        <div class="glass-panel rounded-2xl border border-slate-700 overflow-hidden shadow-xl">
                            <div class="bg-slate-800/80 px-5 py-4 border-b border-slate-700">
                                <h2 class="text-lg md:text-xl font-bold text-white flex items-center gap-2"><i class="fa-solid fa-layer-group text-blue-400"></i> Group 1</h2>
                            </div>
                            <div class="p-5 md:p-6 space-y-6">
                                <div>
                                    <p class="font-semibold text-slate-200 mb-2 text-sm md:text-base leading-snug"><span class="text-blue-400 mr-2">Q4/</span>Calculate the percentage of drug x g in final volume 30ml, if you know every 5ml from NaOH equal (0.225g) from drug x. The burette titration begins with the number 3 and ends with the number 11.</p>
                                    <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700/50 space-y-2 text-sm md:text-base">

                surface: {
                    measure() {
                        const s = app.state.surface;
                        if(!s.selectedConc) return;
                        
                        s.measuring = true;
                        const cData = app.constants.surfaceData[s.selectedConc];
                        const targetDrops = cData.drops;
                        s.drops = 0;
                        app.renderLab();

                        const interval = setInterval(() => {
                            s.drops += 1;
                            const counter = document.getElementById('drop-counter');
                            if (counter) counter.innerText = s.drops;
                            
                            if(s.drops >= targetDrops) {
                                clearInterval(interval);
                                finishMeasurement();
                            }
                        }, 40);

                        const finishMeasurement = () => {
                            const stBase = 72.8; 
                            let calcSt = stBase;
                            
                            if(s.selectedConc !== 'Water') {
                                const water = app.constants.surfaceData['Water'];
                                calcSt = stBase * (cData.density / water.density) * (water.drops / cData.drops);
                            }

                            s.data.push({
                                conc: s.selectedConc, drops: cData.drops, st: calcSt,
                                numericConc: s.selectedConc === 'Water' ? 0 : parseFloat(s.selectedConc)

                kinetics: {
                    setTemp(t) {
                        app.state.kinetics.temp = t;
                        app.state.kinetics.time = 0; 
                        if(app.state.kinetics.data[t].length === 0) {
                             app.state.kinetics.data[t].push({ time: 0, conc: 100, logC: 2 });
                        }
                        app.renderLab();
                    },
                    advanceTime() {
                        const s = app.state.kinetics;
                        if(s.time >= 30) return;
                        
                        s.sampling = true;
                        app.renderLab();

                        setTimeout(() => {
                            if(s.data[s.temp].length === 0) {
                                s.data[s.temp].push({ time: 0, conc: 100, logC: 2 });
                            }

                            s.time += 10;
                            const k = app.constants.kineticsData[s.temp].k;
                            const conc = 100 * Math.exp(-k * s.time);
                            const logC = Math.log10(conc);

                            s.data[s.temp].push({ time: s.time, conc: conc.toFixed(2), logC: logC.toFixed(4) });
                            s.sampling = false;
                            app.renderLab();
                        }, 1200);
                    },
                    drawChart() {
                        const s = app.state.kinetics;
                        Chart.defaults.color = '#94a3b8';
                        const ctx = document.getElementById('labChart').getContext('2d');
                        
                        const datasets = [45, 55, 70].map((t, idx) => {

                                scales: {
                                    y: { title: { display: true, text: 'Log Concentration', color: '#cbd5e1' }, min: 1.0, max: 2.1, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { font: { size: window.innerWidth < 768 ? 10 : 12 } } },
                                    x: { title: { display: true, text: 'Time (min)', color: '#cbd5e1' }, min: 0, max: 35, ticks: { stepSize: 10, font: { size: window.innerWidth < 768 ? 10 : 12 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
                                }
                            }
                        });
                    }
                },

                viscosity: {
                    measure() {
                        const s = app.state.viscosity;
                        s.measuring = true;
                        const cData = app.constants.viscosityData[s.conc];
                        const targetTime = cData.time; 
                        s.flowTimer = 0;
                        app.renderLab();

                        const realTimeMs = targetTime * 1000; 
                        const start = Date.now();

                        const interval = setInterval(() => {
                            const elapsed = Date.now() - start;
                            const progress = Math.min(elapsed / realTimeMs, 1);
                            s.flowTimer = progress * targetTime;
                            
                            const timerEl = document.getElementById('visc-timer');
                            if(timerEl) timerEl.innerText = s.flowTimer.toFixed(1);

                            if(progress >= 1) {
                                clearInterval(interval);
                                finishMeasurement();
                            }
                        }, 40);

                        const finishMeasurement = () => {
                            const t0 = app.constants.viscosityData['0'].time;
                            const t = targetTime;
                            
                            let n_rel = null, n_sp = null, n_red = null;
                            if(s.conc != 0) {
                                n_rel = t / t0;
                                n_sp = n_rel - 1;
                                n_red = n_sp / parseFloat(s.conc);
                            }

                            s.data.push({ c: parseFloat(s.conc), t: t, n_rel, n_sp, n_red });
                            s.measuring = false;
                            app.renderLab();
                        };
                    },
                    drawChart() {
                        const rawData = app.state.viscosity.data.filter(d => d.c > 0);
                        if(rawData.length === 0) return;

                        const data = [...rawData].sort((a,b) => a.c - b.c);
                        
                        const xData = data.map(d=>d.c), yData = data.map(d=>d.n_red);
                        let sumX=0, sumY=0, sumXY=0, sumX2=0; const n = xData.length;
                        for(let i=0; i<n; i++) { sumX += xData[i]; sumY += yData[i]; sumXY += xData[i]*yData[i]; sumX2 += xData[i]*xData[i]; }
                        const slope = n>1 ? (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX) : 0;
                        const intercept = n>1 ? (sumY - slope*sumX) / n : (n==1 ? yData[0] : 0);
                        
                        const chartData = n>1 ? [{c:0, n_red:intercept}, ...data] : data;

                        Chart.defaults.color = '#94a3b8';
                        const ctx = document.getElementById('labChart').getContext('2d');
                        
                        app.chartInstance = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: chartData.map(d => d.c),
                                datasets: [{
                                    label: 'Reduced Viscosity',
                                    data: chartData.map(d => d.n_red),
                                    borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.1)',
                                    borderWidth: 3, pointBackgroundColor: (ctx) => ctx.dataIndex === 0 ? '#ef4444' : '#fcd34d', pointRadius: (ctx) => ctx.dataIndex === 0 ? (window.innerWidth < 768 ? 6 : 8) : (window.innerWidth < 768 ? 4 : 6), pointBorderColor: '#f59e0b', pointBorderWidth: 2,
                                    segment: { borderDash: ctx => ctx.p0DataIndex === 0 ? [6, 6] : undefined }
                                }]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => ctx.dataIndex === 0 ? `Intrinsic Viscosity [η] = ${ctx.raw.toFixed(3)}` : `η_red = ${ctx.raw.toFixed(3)}` } } },
                                scales: {
                                    y: { title: { display: true, text: 'Reduced Viscosity (η_red)', color: '#cbd5e1' }, suggestedMin: intercept * 0.8, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { font: { size: window.innerWidth < 768 ? 10 : 12 } } },
                                    x: { title: { display: true, text: 'Concentration (w/v %)', color: '#cbd5e1' }, min: 0, grid: { display: false }, ticks: { font: { size: window.innerWidth < 768 ? 10 : 12 } } }
                                }
                            }
                        });
                    }
                }
            },

                                        <input type="radio" name="q${i}" value="${opt === q.a ? 'correct' : 'wrong'}" class="peer sr-only" onchange="this.parentElement.parentElement.parentElement.querySelectorAll('label').forEach(l=>l.classList.remove('ring-2', 'ring-emerald-500', 'bg-emerald-900/20', 'ring-rose-500', 'bg-rose-900/20')); if(this.value==='correct') { this.parentElement.parentElement.classList.add('ring-2', 'ring-emerald-500', 'bg-emerald-900/20'); } else { this.parentElement.parentElement.classList.add('ring-2', 'ring-rose-500', 'bg-rose-900/20'); }">
                                        <div class="w-4 h-4 md:w-5 md:h-5 rounded-full border-2 border-slate-500 peer-checked:border-transparent bg-slate-900 transition-colors group-hover:border-blue-400"></div>
                                        <div class="absolute w-2 h-2 md:w-2.5 md:h-2.5 rounded-full bg-blue-500 opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                                    </div>
                                    <span class="text-xs md:text-sm text-slate-300 group-hover:text-white transition-colors leading-snug md:leading-normal">${opt}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>`;
                });
                html += '</div>';
                
                content.innerHTML = html;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }
        };

        window.onload = () => {
            app.state.kinetics.data[45].push({ time: 0, conc: 100, logC: 2 });
            app.init();
        };
    </script>
</body>
</html>
